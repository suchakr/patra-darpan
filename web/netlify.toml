[build]
  publish = "."
  command = "" # Explicitly override UI default (Jekyll) to nothing
  ignore = "exit 1" # Always build, even if no changes detected by Git (manual deploy)
  functions = "netlify/functions"

[dev]
  framework = "#static"

  publish = "."

[[headers]]
  for = "/assets/js/p60.js"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=3600"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
