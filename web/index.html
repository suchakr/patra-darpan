<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patra Darpan</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel header">
            <div class="logo">
                <button id="menu-toggle" class="menu-toggle" aria-label="Toggle Menu">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1>Patra <span>Darpan</span></h1>
                <span class="badge" id="mode-badge">Initializing...</span>
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme" title="Toggle Light/Dark Mode">
                    <!-- Sun Icon (for Dark Mode) -->
                    <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <!-- Moon Icon (for Light Mode) -->
                    <svg class="moon-icon hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
            <div class="search-bar">
                <div class="search-input-wrapper">
                    <input type="text" id="search-input" placeholder="Search title, author..." autofocus>
                    <div class="search-actions">
                        <button id="regex-toggle" class="icon-toggle" aria-label="Toggle Regex"
                            title="Use Regular Expressions">
                            <span>.*</span>
                        </button>
                        <div class="search-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </div>
                    </div>
                </div>
                <select id="sort-select" class="sort-dropdown" aria-label="Sort Papers">
                    <option value="relevance">Relevance</option>
                    <option value="newest" selected>Newest (Year)</option>
                    <option value="oldest">Oldest (Year)</option>
                    <option value="title">Title (A-Z)</option>
                    <option value="size">Size (Smallest)</option>
                </select>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-layout">
            <!-- Sidebar Filters -->
            <aside class="glass-panel sidebar" id="sidebar">
                <div class="sidebar-header mobile-only">
                    <h2>Filters</h2>
                    <button id="close-menu" class="close-btn">&times;</button>
                </div>

                <div class="filter-actions">
                    <button id="reset-filters" class="btn-text">Reset All Filters</button>
                </div>

                <div class="filters-row">
                    <!-- Column 1: Category + Decade -->
                    <div class="filter-group">
                        <h3>Category</h3>
                        <div id="category-filters" class="checkbox-list">
                            <!-- Populated by JS -->
                        </div>

                        <h3 style="margin-top: 24px;">Decade</h3>
                        <div id="decade-filters" class="checkbox-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- Column 2: Subject -->
                    <div class="filter-group">
                        <h3>Subject</h3>
                        <div id="subject-filters" class="checkbox-list">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
                <div class="stats-panel">
                    <span id="result-count">0</span> papers found
                </div>
            </aside>

            <!-- Results Grid -->
            <section class="results-area">
                <div id="results-grid" class="grid-container">
                    <!-- Cards Populated by JS -->
                </div>
                <div id="empty-state" class="empty-state hidden">
                    <p>No papers found matching your criteria.</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
</body>

</html>
