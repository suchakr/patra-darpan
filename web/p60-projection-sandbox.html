<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P60 Projection Sandbox</title>
    <style>
        body {
            color: #111827;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.5;
            margin: 0;
            padding: 32px;
        }

        main {
            margin: 0 auto;
            max-width: 1200px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #d1d5db;
            padding: 8px 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f3f4f6;
        }

        .status {
            color: #4b5563;
            margin: 12px 0 20px;
        }

        .error {
            color: #b91c1c;
        }
    </style>
</head>
<body>
    <main>
        <h1>P60 Projection Sandbox</h1>
        <p id="status" class="status">Loading projection...</p>
        <table aria-label="Generated P60 projection">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Year</th>
                    <th>Category</th>
                    <th>Paper Title</th>
                    <th>Author</th>
                    <th>Source</th>
                </tr>
            </thead>
            <tbody id="p60-rows">
                <tr>
                    <td colspan="6">Waiting for assets/js/p60.js</td>
                </tr>
            </tbody>
        </table>
    </main>

    <script>
        function renderP60(payload) {
            const status = document.getElementById('status');
            const tbody = document.getElementById('p60-rows');

            if (!payload || !Array.isArray(payload.rows)) {
                status.textContent = 'Projection payload is missing or invalid.';
                status.classList.add('error');
                return;
            }

            tbody.innerHTML = '';
            payload.rows.forEach((row, index) => {
                const tr = document.createElement('tr');
                const cells = [
                    String(index + 1),
                    row.year || '',
                    row.category || '',
                    row.title || '',
                    row.author || '',
                    row.source || ''
                ];

                cells.forEach((value, cellIndex) => {
                    const td = document.createElement('td');
                    if (cellIndex === 3 && row.url) {
                        const link = document.createElement('a');
                        link.href = row.url;
                        link.target = '_blank';
                        link.rel = 'noopener noreferrer';
                        link.textContent = value;
                        td.appendChild(link);
                    } else {
                        td.textContent = value;
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

            status.textContent = `Loaded ${payload.rows.length} rows from assets/js/p60.js.`;
        }

        window.addEventListener('patra-darpan:p60-ready', (event) => {
            renderP60(event.detail || window.PATRA_DARPAN_P60);
        });

        window.setTimeout(() => {
            if (!window.PATRA_DARPAN_P60) {
                const status = document.getElementById('status');
                status.textContent = 'assets/js/p60.js did not load.';
                status.classList.add('error');
            }
        }, 2000);
    </script>
    <script src="assets/js/p60.js"></script>
</body>
</html>
